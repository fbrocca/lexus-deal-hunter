# Lexus deal-hunter configuration.
#
# Target: Lexus NX 450h+ (the PHEV). Auto.dev indexes the whole NX family
# under model "NX", so the `keywords` filter isolates the 450h variant and
# drops NX 250 / 350 / 350h. Color is intentionally NOT filtered.

search:
  make: Lexus
  # Auto.dev indexes Lexus by powertrain-specific model strings: `model=NX`
  # returns ONLY the gas NX 350 (verified: 1,108 listings, zero 450h+). The
  # plug-in hybrid lives under its own model name, so we query candidate
  # spellings and keep whichever Auto.dev actually has inventory for.
  # "NX 450h+" is the spelling Auto.dev's v2 feed uses for the PHEV (verified).
  # "NX 450h" is kept as a fallback spelling.
  models:
    - "NX 450h+"
    - "NX 450h"
  # The model string now carries the variant, so no trim keyword filter needed.
  keywords: []
  condition: new        # new | used | all
  year_min: 2022
  year_max: null
  price_max: null
  # Optional geo narrowing (Auto.dev supports zip + radius). Leave null for nationwide.
  zip_code: null
  radius_miles: null

thresholds:
  # A car must beat at least one of these to be "interesting" for the alert
  # section of the digest. The daily digest always lists the top-10 cheapest
  # regardless of these thresholds.
  min_discount_pct: 8.0     # >= 8% off MSRP
  max_price: null           # or under this absolute price

email:
  subject_prefix: "Lexus NX 450h+"
  # Number of rows in the "cheapest" table of the daily digest.
  top_n_cheapest: 10
  # Number of rows in the "biggest discount" table.
  top_n_discount: 10

storage:
  # Snapshot of <vin>: <price> from the previous run, used to detect drops.
  snapshot_path: data/snapshot.json
