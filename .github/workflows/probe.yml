name: probe

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - name: Probe Auto.dev
        env:
          AUTO_DEV_API_KEY: ${{ secrets.AUTO_DEV_API_KEY }}
        run: python scripts/probe.py
